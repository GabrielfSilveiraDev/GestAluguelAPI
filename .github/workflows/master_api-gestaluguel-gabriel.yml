# SUMMARY: GitHub Actions workflow to build and deploy the .NET API to Azure Web Apps.
# CHANGE: Removed redundant solution-wide 'dotnet build' step to optimize pipeline time. Published only the API project.

name: Build and deploy ASP.Net Core app to Azure Web App - api-gestaluguel-gabriel

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read # This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up .NET Core
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.x'

      # Removed 'dotnet build' step as 'dotnet publish' implicitly builds the project

      - name: dotnet publish
        run: dotnet publish BackEndAluguel/BackEndAluguel.csproj -c Release -o ${{env.DOTNET_ROOT}}/myapp

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: .net-app
          path: ${{env.DOTNET_ROOT}}/myapp

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write # This is required for requesting the JWT
      contents: read # This is required for actions/checkout

    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: .net-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E8B780E6D0984439AB23E89EECBFF00D }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_906DFFA97806463B8683CC3864239F21 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_FC33C74004A2443FBC3DE65305CA16A7 }}

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'api-gestaluguel-gabriel'
          slot-name: 'Production'
          package: .
